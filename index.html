<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InvenTrack — Inventory Management System</title>

  <!-- Bootstrap 5 CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <!-- Custom styles -->
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/responsive.css" />
  <link rel="icon" href="favicon.svg" />
</head>
<body>

<div id="app-wrapper">

  <!-- ════════════════════════════════════════════════════════
       SIDEBAR
       All href="..." replaced with href="#/route"
       Active class is managed by Router._setActiveLink()
       matching data-section against the current hash
       ════════════════════════════════════════════════════════ -->
  <nav id="sidebar">

    <!-- Brand -->
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
          <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
          <line x1="12" y1="22.08" x2="12" y2="12"/>
        </svg>
      </div>
      <span class="brand-name">InvenTrack</span>
    </div>

    <!-- Main menu -->
    <div class="nav-section-label">Main menu</div>

    <a href="#/dashboard" class="nav-link" data-section="dashboard">
      <i class="bi bi-grid-1x2"></i> Dashboard
    </a>

    <a href="#/products" class="nav-link" data-section="products">
      <i class="bi bi-box-seam"></i> Products
      <!-- Badge shown by app.js when low-stock count > 0 -->
      <span class="nav-badge d-none" id="low-stock-badge">0</span>
    </a>

    <a href="#/suppliers" class="nav-link" data-section="suppliers">
      <i class="bi bi-truck"></i> Suppliers
    </a>

    <a href="#/orders" class="nav-link" data-section="orders">
      <i class="bi bi-cart-check"></i> Purchase orders
    </a>

    <!-- Inventory group -->
    <div class="nav-section-label">Inventory</div>

    <a href="#/adjustments" class="nav-link" data-section="adjustments">
      <i class="bi bi-arrow-left-right"></i> Adjustments
    </a>

    <a href="#/reports" class="nav-link" data-section="reports">
      <i class="bi bi-bar-chart-line"></i> Reports
    </a>

    <!-- System group -->
    <div class="nav-section-label">System</div>

    <a href="#/log" class="nav-link" data-section="log">
      <i class="bi bi-clock-history"></i> Activity log
      <span class="nav-badge d-none" id="log-nav-badge">0</span>
    </a>

    <!-- User info slot — app.js fills the name and wires logout -->
    <div class="mt-auto" style="border-top: 1px solid rgba(255,255,255,0.07);">
      <div class="d-flex align-items-center gap-2 p-3 pb-2">

        <!-- Avatar circle with first letter — written by app.js -->
        <div id="sidebar-avatar"
             style="width:32px;height:32px;border-radius:50%;background:var(--brand);
                    display:flex;align-items:center;justify-content:center;flex-shrink:0;">
          <i class="bi bi-person-fill text-white" style="font-size:16px;"></i>
        </div>

        <div class="flex-grow-1 overflow-hidden">
          <!-- app.js sets this to the session name -->
          <div id="sidebar-username"
               class="text-white text-truncate"
               style="font-size:13px;font-weight:500;">
            Loading...
          </div>
          <div class="text-truncate"
               style="font-size:11px;color:rgba(255,255,255,0.5);">
            Manager
          </div>
        </div>

        <!-- Logout button — app.js attaches the click handler -->
        <button id="logout-btn"
                title="Logout"
                style="background:none;border:none;padding:4px;color:rgba(255,255,255,0.5);
                       transition:color 0.2s;cursor:pointer;"
                onmouseover="this.style.color='#ef4444'"
                onmouseout="this.style.color='rgba(255,255,255,0.5)'">
          <i class="bi bi-box-arrow-right" style="font-size:16px;"></i>
        </button>

      </div>
      <div class="px-3 pb-3"
           style="font-size:10px;color:rgba(255,255,255,0.2);">
        InvenTrack v1.0 &copy; 2026
      </div>
    </div>

  </nav><!-- /sidebar -->

  <!-- ════════════════════════════════════════════════════════
       MAIN AREA
       ════════════════════════════════════════════════════════ -->
  <div id="main-area">

    <!-- Top bar -->
    <div id="topbar">
      <button id="sidebar-toggle"><i class="bi bi-list"></i></button>
      <!-- Page title updated by each view via document.getElementById('page-title') -->
      <h1 id="page-title">Dashboard</h1>
      <div class="ms-auto d-flex align-items-center gap-2">
        <span style="font-size:12px;color:#94a3b8;">Data stored locally</span>
        <i class="bi bi-lock-fill" style="color:#94a3b8;font-size:13px;"></i>
      </div>
    </div>

    <!-- ═══════════════════════════════════════════════════
         #content — the ONLY thing the Router swaps.
         Every view's render() writes into this div.
         Nothing else goes here — no static sections,
         no hardcoded modals. Views own their own HTML.
         ═══════════════════════════════════════════════════ -->
    <div id="content"></div>

  </div><!-- /main-area -->
</div><!-- /app-wrapper -->

<!-- Toast container — used by all views for notifications -->
<div id="toast-container"></div>

<!-- ════════════════════════════════════════════════════════
     SCRIPTS
     Bootstrap must load before the module so its globals
     (bootstrap.Modal etc.) are available to view scripts.
     jQuery is NOT used — removed entirely.
     ════════════════════════════════════════════════════════ -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Single entry point — type="module" enables ES imports -->
<script type="module" src="js/app.js"></script>

</body>
</html>
