<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stock Adjustments</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <link rel="stylesheet" href="../style.css" />
  </head>

  <body>
    <main>
      <section id="adjustment-section" class="container-fluid">
        <div class="row justify-content-evenly">
          <div class="card shadow px-3 py-4 my-4 col-12 col-md-4">
            <div class="d-flex align-items-center border-bottom pb-3 mb-3">
              <h5>
                <i class="fas fa-arrow-right-arrow-left text-secondary"></i> New
                Stock Adjustment
              </h5>
            </div>
            <div class="mb-3">
              <label for="productName" class="form-label"
                >Product<span class="text-danger"> *</span></label
              >
              <select class="form-select" id="productName" required>
                <option value="" disabled selected>Select product</option>
                <option value="Product 1">Product 1</option>
                <option value="Product 2">Product 2</option>
                <option value="Product 3">Product 3</option>
              </select>
            </div>
            <div class="mb-3 row">
              <div class="col-12 col-md-6">
                <label for="supplierName" class="form-label"
                  >Adjustment Type<span class="text-danger"> *</span></label
                >
                <select class="form-select" id="supplierName" required>
                  <option value="" disabled selected>Select Type</option>
                  <option value="increase">+ Increase</option>
                  <option value="decrease">- Decrease</option>
                </select>
              </div>
              <div class="col-12 col-md-6">
                <!-- quantity input -->
                <label for="purchaseQty" class="form-label"
                  >Quantity <span class="text-danger">*</span></label
                >
                <input
                  type="number"
                  min="1"
                  class="form-control"
                  id="purchaseQty"
                  placeholder="e.g., 10"
                  required
                />
              </div>
            </div>

            <!-- reason input -->
            <div class="mb-3">
              <label for="reason" class="form-label"
                >Reason <span class="text-danger">*</span></label
              >
              <textarea
                class="form-control"
                id="reason"
                placeholder="e.g., Damaged in warehouse"
                required
              ></textarea>
            </div>
            <div class="mb-3 alert alert-primary">
              Current qty: <span id="currentQty">50</span> +
              <span id="adjustmentQty">0</span> =
              <span id="newQty" class="text-success">50</span>
            </div>
            <div class="w-100">
              <button type="submit" class="btn btn-primary form-control">
                <i class="fas fa-save me-1"></i> Save Adjustment
              </button>
            </div>
          </div>
          <div class="card shadow px-3 py-4 my-4 col-12 col-md-7 h-fit">
            <div class="d-flex align-items-center border-bottom pb-3 mb-3">
              <h5>
                <i class="fas fa-clock text-secondary"></i> Adjustment History
              </h5>
            </div>
            <div class="table-wrapper table-responsive">
              <table class="table purchase-table table-hover overflow-scroll">
                <thead>
                  <tr class="table-secondary">
                    <th>Product</th>
                    <th>Type</th>
                    <th>Change</th>
                    <th>Reason</th>
                    <th>Date</th>
                  </tr>
                </thead>
                <tbody>
                  <tr>
                    <td>HDMI Cable</td>
                    <td><span class="badge bg-danger">Decrease</span></td>
                    <td>
                      <span class="text-danger">-5</span>
                    </td>
                    <td>Damaged in warehouse</td>
                    <td class="text-secondary">2024-06-01</td>
                  </tr>
                  <tr>
                    <td>USB-C Adapter</td>
                    <td><span class="badge bg-success">Increase</span></td>
                    <td>
                      <span class="text-success">+3</span>
                    </td>
                    <td>Stocktake connection</td>
                    <td class="text-secondary">2024-06-02</td>
                  </tr>
                  <tr>
                    <td>Wireless Mouse</td>
                    <td><span class="badge bg-success">Increase</span></td>
                    <td>
                      <span class="text-success">+3</span>
                    </td>
                    <td>Stocktake connection</td>
                    <td class="text-secondary">2024-06-02</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/app.js"></script>
  </body>
</html>
